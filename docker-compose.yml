version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product-api
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=CRNProductDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - JwtSettings__Secret=CRNTechnosoftSuperSecretKey2024!!CRNTechnosoftKey
      - JwtSettings__Issuer=ProductApi
      - JwtSettings__Audience=ProductApiUsers
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - product-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong@Passw0rd -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - product-network

volumes:
  sqlserver-data:

networks:
  product-network:
    driver: bridge
